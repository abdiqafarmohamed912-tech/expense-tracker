<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track your daily expenses easily. Add, view and manage your spending.">
  <title>Expense Tracker – Add Expense</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- decorative top bar -->
  <div class="top-bar"></div>

  <!-- navbar -->
  <header>
    <nav>
      <p class="nav-logo">💰 <span>Expense</span> Tracker</p>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Add Expense</a></li>
        <li><a href="expenses.html">Expenses</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>
  </header>

  <!-- page intro -->
  <div class="intro-section">
    <strong>Track Your <span>Spending</span></strong>
    <p>Log an expense below and keep your finances under control.</p>
  </div>

  <!-- main form -->
  <main>
    <section class="card">

      <!-- card header -->
      <div class="card-header">
        <span>📋</span>
        <div>
          <p>New Expense</p>
          <small>Fill in all fields to save an expense</small>
        </div>
      </div>

      <div class="card-body">

        <!-- expense name -->
        <label>Expense Name</label>
        <input type="text" id="expense-name" placeholder="e.g. Lunch, Uber, Netflix">

        <!-- amount and date side by side -->
        <div class="row-two">
          <div>
            <label>Amount (KES)</label>
            <input type="number" id="expense-amount" min="0" placeholder="e.g. 500">
          </div>
          <div>
            <label>Date</label>
            <input type="date" id="expense-date">
          </div>
        </div>

        <!-- category dropdown -->
        <label>Category</label>
        <select id="expense-category">
          <option value="">Select Category</option>
          <option value="Food & Drink">Food &amp; Drink</option>
          <option value="Transport">Transport</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Shopping">Shopping</option>
          <option value="Health">Health</option>
          <option value="Education">Education</option>
          <option value="Bills & Utilities">Bills &amp; Utilities</option>
          <option value="Other">Other</option>
        </select>

        <!-- notes (optional) -->
        <label>Notes (optional)</label>
        <input type="text" id="expense-notes" placeholder="e.g. Paid with M-Pesa">

        <!-- error messages -->
        <div id="alert-box"></div>

        <!-- save button -->
        <button type="button" id="btn-save">Save Expense</button>

        <!-- success message -->
        <div id="success-panel" class="success-panel">
          <p id="success-msg"></p>
          <button type="button" id="btn-reset">Add Another Expense</button>
        </div>

      </div>
    </section>
  </main>

  <!-- footer -->
  <footer>
    <p>&copy; <span id="footer-year"></span> Expense Tracker — Abdiqafar Mohamed</p>
    <p><a href="expenses.html">View Expenses</a> · <a href="about.html">About</a></p>
  </footer>

  <div class="bottom-bar"></div>
  <script src="script.js"></script>
</body>
</html>
